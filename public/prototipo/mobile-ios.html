<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Controle de Gastos · iOS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      padding: 20px;
    }

    .iphone-frame {
      width: 390px;
      height: 844px;
      background: #f5f5f7;
      border-radius: 56px;
      padding: 12px;
      position: relative;
      box-shadow: 0 0 0 8px #333, 0 0 0 10px #555, 0 20px 60px rgba(0,0,0,0.5);
      flex-shrink: 0;
    }

    .iphone-notch {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 150px;
      height: 32px;
      background: #000;
      border-radius: 0 0 20px 20px;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .iphone-notch .dynamic-island {
      width: 100px;
      height: 22px;
      background: #1a1a1a;
      border-radius: 20px;
    }
    .iphone-notch .camera {
      width: 10px;
      height: 10px;
      background: #2a2a3a;
      border-radius: 50%;
      position: absolute;
      right: 40px;
    }

    .iphone-screen {
      width: 100%;
      height: 100%;
      border-radius: 46px;
      overflow: hidden;
      background: #f5f5f7;
      display: flex;
      flex-direction: column;
    }

    .screen-content {
      flex: 1;
      overflow: hidden;
      position: relative;
      padding-top: 44px;
    }
    .screen-content iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }

    /* iOS Tab Bar */
    .ios-tabbar {
      display: flex;
      background: rgba(255,255,255,0.94);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid #d2d2d7;
      padding: 6px 0 20px;
      position: relative;
      z-index: 10;
    }
    .ios-tabbar .tab-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 4px 0;
      cursor: pointer;
      border: 0;
      background: none;
      color: #6e6e73;
      transition: color 0.1s;
      font-size: 10px;
      -webkit-tap-highlight-color: transparent;
    }
    .ios-tabbar .tab-item.active { color: #0071e3; }
    .ios-tabbar .tab-item .tab-icon {
      font-size: 24px;
      line-height: 1;
    }
    .ios-tabbar .tab-item .tab-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    .device-label {
      text-align: center;
      color: #888;
      font-size: 13px;
      margin-bottom: 12px;
      letter-spacing: 0.03em;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div style="display: flex; flex-direction: column; align-items: center;">
    <div class="device-label">iPhone 15 Pro · iOS</div>
    <div class="iphone-frame">
      <div class="iphone-notch">
        <span class="camera"></span>
      </div>
      <div class="iphone-screen">
        <div class="screen-content">
          <iframe id="ios-screen" src="screens/dashboard.html"></iframe>
        </div>
        <div class="ios-tabbar" id="ios-tabbar">
          <button class="tab-item active" data-screen="screens/dashboard.html">
            <span class="tab-icon">🏠</span>
            <span class="tab-label">Resumo</span>
          </button>
          <button class="tab-item" data-screen="screens/transactions.html">
            <span class="tab-icon">💳</span>
            <span class="tab-label">Transações</span>
          </button>
          <button class="tab-item" data-screen="screens/add-transaction.html">
            <span class="tab-icon">➕</span>
            <span class="tab-label">Adicionar</span>
          </button>
          <button class="tab-item" data-screen="screens/reports.html">
            <span class="tab-icon">📊</span>
            <span class="tab-label">Relatórios</span>
          </button>
          <button class="tab-item" data-screen="screens/profile.html">
            <span class="tab-icon">👤</span>
            <span class="tab-label">Perfil</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      var iframe = document.getElementById('ios-screen');
      var tabs = document.querySelectorAll('#ios-tabbar .tab-item');

      tabs.forEach(function(tab) {
        tab.addEventListener('click', function() {
          tabs.forEach(function(t) { t.classList.remove('active'); });
          tab.classList.add('active');
          iframe.src = tab.getAttribute('data-screen');
        });
      });

      window.addEventListener('message', function(e) {
        if (e.data === 'add-transaction') {
          tabs.forEach(function(t) { t.classList.remove('active'); });
          var addTab = document.querySelector('[data-screen="screens/add-transaction.html"]');
          if (addTab) addTab.classList.add('active');
          iframe.src = 'screens/add-transaction.html';
        }
      });
    })();
  </script>
</body>
</html>
