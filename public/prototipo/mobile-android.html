<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Controle de Gastos · Android</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', sans-serif;
      padding: 20px;
    }

    .pixel-frame {
      width: 412px;
      height: 900px;
      background: #f5f5f7;
      border-radius: 48px;
      padding: 12px;
      position: relative;
      box-shadow: 0 0 0 8px #333, 0 0 0 10px #555, 0 20px 60px rgba(0,0,0,0.5);
      flex-shrink: 0;
    }

    .pixel-notch {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      width: 120px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pixel-notch .camera-hole {
      width: 14px;
      height: 14px;
      background: #1a1a1a;
      border-radius: 50%;
      position: absolute;
    }
    .pixel-notch .earpiece {
      width: 40px;
      height: 4px;
      background: #1a1a1a;
      border-radius: 4px;
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
    }

    .pixel-screen {
      width: 100%;
      height: 100%;
      border-radius: 38px;
      overflow: hidden;
      background: #f5f5f7;
      display: flex;
      flex-direction: column;
    }

    /* Android status bar */
    .android-status {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px 8px;
      font-size: 14px;
      font-weight: 500;
      background: #f5f5f7;
    }

    .screen-content {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    .screen-content iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }

    /* Material 3 Bottom Navigation */
    .android-bottom-nav {
      display: flex;
      background: #ffffff;
      border-top: 1px solid #d2d2d7;
      padding: 4px 0 8px;
      position: relative;
      z-index: 10;
    }
    .android-bottom-nav .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 6px 0 4px;
      cursor: pointer;
      border: 0;
      background: none;
      color: #6e6e73;
      transition: color 0.1s;
      font-size: 12px;
      position: relative;
      -webkit-tap-highlight-color: transparent;
    }
    .android-bottom-nav .nav-item.active {
      color: #0071e3;
    }
    .android-bottom-nav .nav-item.active::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 32px;
      height: 3px;
      background: #0071e3;
      border-radius: 0 0 4px 4px;
    }
    .android-bottom-nav .nav-item .nav-icon {
      font-size: 22px;
      line-height: 1;
    }
    .android-bottom-nav .nav-item .nav-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    .device-label {
      text-align: center;
      color: #888;
      font-size: 13px;
      margin-bottom: 12px;
      letter-spacing: 0.03em;
      font-weight: 500;
    }

    .android-nav-bar {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 6px 0 2px;
      background: #ffffff;
    }
    .android-nav-bar .nav-btn {
      width: 36px;
      height: 36px;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div style="display: flex; flex-direction: column; align-items: center;">
    <div class="device-label">Pixel 7 · Android 14</div>
    <div class="pixel-frame">
      <div class="pixel-notch">
        <div class="earpiece"></div>
      </div>
      <div class="pixel-screen">
        <div class="screen-content">
          <iframe id="android-screen" src="screens/dashboard.html"></iframe>
        </div>
        <div class="android-bottom-nav" id="android-nav">
          <button class="nav-item active" data-screen="screens/dashboard.html">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">Resumo</span>
          </button>
          <button class="nav-item" data-screen="screens/transactions.html">
            <span class="nav-icon">💳</span>
            <span class="nav-label">Transações</span>
          </button>
          <button class="nav-item" data-screen="screens/add-transaction.html">
            <span class="nav-icon">➕</span>
            <span class="nav-label">Adicionar</span>
          </button>
          <button class="nav-item" data-screen="screens/reports.html">
            <span class="nav-icon">📊</span>
            <span class="nav-label">Relatórios</span>
          </button>
          <button class="nav-item" data-screen="screens/profile.html">
            <span class="nav-icon">👤</span>
            <span class="nav-label">Perfil</span>
          </button>
        </div>
        <div class="android-nav-bar">
          <svg class="nav-btn" viewBox="0 0 24 24" fill="none" stroke="#6e6e73" stroke-width="2"><path d="M20 20H4V10l8-7 8 7v10z"/></svg>
          <svg class="nav-btn" viewBox="0 0 24 24" fill="none" stroke="#6e6e73" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      var iframe = document.getElementById('android-screen');
      var navItems = document.querySelectorAll('#android-nav .nav-item');

      navItems.forEach(function(item) {
        item.addEventListener('click', function() {
          navItems.forEach(function(n) { n.classList.remove('active'); });
          item.classList.add('active');
          iframe.src = item.getAttribute('data-screen');
        });
      });

      window.addEventListener('message', function(e) {
        if (e.data === 'add-transaction') {
          navItems.forEach(function(n) { n.classList.remove('active'); });
          var addItem = document.querySelector('[data-screen="screens/add-transaction.html"]');
          if (addItem) addItem.classList.add('active');
          iframe.src = 'screens/add-transaction.html';
        }
      });
    })();
  </script>
</body>
</html>
