<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Nova Transação · Controle de Gastos</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <div class="status-bar" role="status" aria-label="Status do dispositivo">
    <span class="time" aria-label="9 horas e 41 minutos">9:41</span>
    <span class="icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none" aria-label="Sinal de rede">
        <rect x="0" y="8" width="3" height="4" rx="0.5" fill="currentColor"/>
        <rect x="5" y="5" width="3" height="7" rx="0.5" fill="currentColor"/>
        <rect x="10" y="2.5" width="3" height="9.5" rx="0.5" fill="currentColor"/>
        <rect x="15" y="0" width="3" height="12" rx="0.5" fill="currentColor"/>
      </svg>
      <svg width="15" height="12" viewBox="0 0 15 12" fill="none" aria-label="WiFi conectado">
        <path d="M1.5 4.5A9.5 9.5 0 0 1 7.5 2a9.5 9.5 0 0 1 6 2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M3.5 6.5A6 6 0 0 1 7.5 5a6 6 0 0 1 4 1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M5.5 8.5A2.5 2.5 0 0 1 7.5 8a2.5 2.5 0 0 1 2 .5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none" aria-label="Bateria 75%">
        <rect x="0.5" y="0.5" width="22" height="11" rx="2" stroke="currentColor" stroke-opacity="0.35"/>
        <rect x="2.5" y="2" width="18" height="8" rx="1" fill="currentColor" fill-opacity="0.35"/>
        <rect x="2.5" y="2" width="13.5" height="8" rx="1" fill="currentColor"/>
        <rect x="23.5" y="4" width="1.5" height="4" rx="0.5" fill="currentColor" fill-opacity="0.35"/>
      </svg>
    </span>
  </div>

  <div class="app-header">
    <button class="header-btn" onclick="window.history.back()" aria-label="Fechar">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M4 4l10 10M14 4L4 14"/>
      </svg>
    </button>
    <h1 style="font-size: 18px;">Nova Transação</h1>
    <button class="btn btn-sm btn-primary" style="padding: 8px 16px;">Salvar</button>
  </div>

  <div class="p-page p-page-top">
    <div class="form-group">
      <label class="form-label">Valor</label>
      <input class="form-input" type="text" placeholder="R$ 0,00" style="font-size: 28px; font-weight: 700; text-align: center; padding: 18px;" />
    </div>

    <div class="tabs" style="margin: 0 0 var(--gap-lg);">
      <span class="tab active">Despesa</span>
      <span class="tab">Receita</span>
      <span class="tab">Transferência</span>
    </div>

    <div class="form-group">
      <label class="form-label">Categoria</label>
      <div class="category-picker">
        <span class="category-pill selected">🍕 Alimentação</span>
        <span class="category-pill">🚇 Transporte</span>
        <span class="category-pill">🏠 Moradia</span>
        <span class="category-pill">💊 Saúde</span>
        <span class="category-pill">🎬 Lazer</span>
        <span class="category-pill">🛒 Compras</span>
        <span class="category-pill">📱 Assinaturas</span>
        <span class="category-pill">💰 Renda</span>
        <span class="category-pill">📄 Faturas</span>
        <span class="category-pill">➕ Outros</span>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Descrição</label>
      <input class="form-input" type="text" placeholder="Ex: Restaurante do Zé" />
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Data</label>
        <input class="form-input" type="date" />
      </div>
      <div class="form-group">
        <label class="form-label">Cartão</label>
        <select class="form-input form-select">
          <option>Nenhum</option>
          <option>Nubank</option>
          <option>Inter</option>
          <option>Itaú</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Observações</label>
      <textarea class="form-input form-textarea" placeholder="Informações adicionais..."></textarea>
    </div>

    <div class="form-group">
      <label class="form-label">Recorrente?</label>
      <div style="display: flex; gap: var(--gap-sm);">
        <span class="category-pill selected">Não</span>
        <span class="category-pill">Semanal</span>
        <span class="category-pill">Mensal</span>
        <span class="category-pill">Anual</span>
      </div>
    </div>
  </div>

  <script src="../js/app.js"></script>
</body>
</html>
